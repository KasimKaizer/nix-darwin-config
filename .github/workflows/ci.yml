name: "Nix CI"
on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  build:
    # Use Apple Silicon runners to match your aarch64-darwin architecture
    runs-on: macos-14 
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
      
    - name: Magic Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Check formatting
      run: nix fmt -- --check .
      
    - name: Check flake validity
      run: nix flake check
      
    - name: Build darwin system
      run: nix build .#darwinConfigurations.inferno.system
